    <script>

      // Configure GA4 — disable auto page_view here because
      // Analytics.jsx fires manual page_view on every route change (SPA fix)

        send_page_view: false,
        // Enables enhanced measurement for scroll, outbound clicks, etc.
        enhanced_measurements: true
      });
    </script>
